<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mango Royale</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: black;
}

header h1 {
  color: gold;
  margin: 0;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
  background: linear-gradient(to bottom, #000, #1a1a1a);
}

.hero h2 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  color: #bbb;
}

.btn {
  margin-top: 20px;
  padding: 12px 30px;
  background: gold;
  color: black;
  border: none;
  border-radius: 30px;
  font-weight: bold;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: 1fr;
  padding: 20px;
}

.card {
  background: #1a1a1a;
  margin: 10px 0;
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  background: #222;
}

.card h3 {
  color: gold;
}

.price {
  margin-top: 10px;
  color: #ccc;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: black;
  color: #777;
}
</style>

</head>

<body>

<header>
  <h1>Mango Royale 🥭</h1>
</header>

<section class="hero">
  <h2>Premium Mango Experience</h2>
  <p>Handpicked luxury mangoes delivered to your door</p>
  <a href="https://wa.me/919876543210">
    <button class="btn">Order on WhatsApp</button>
  </a>
</section>

<section class="products">

  <div class="card">
    <h3>Alphonso Mango</h3>
    <p class="price">₹1200 / dozen</p>
  </div>

  <div class="card">
    <h3>Kesar Mango</h3>
    <p class="price">₹900 / dozen</p>
  </div>

  <div class="card">
    <h3>Dasheri Mango</h3>
    <p class="price">₹700 / dozen</p>
  </div>

</section>

<footer>
  © 2026 Mango Royale | Premium Fruits
</footer>

</body>
</html>
